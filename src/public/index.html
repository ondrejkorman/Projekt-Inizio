<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google SERP Scraper</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Google SERP Scraper</h1>
      <p class="subtitle">Vyhledání organických výsledků z Google (bez reklam)</p>
    </header>

    <aside class="legal-notice" role="note">
      <strong>Demonstrační účel.</strong>
      Výsledky získáváme přes
      <a href="https://serper.dev" target="_blank" rel="noopener noreferrer">Serper.dev SERP API</a>
      (legitimní služba pro Google vyhledávání). Vyhledávání je rate-limitováno.
    </aside>

    <form id="search-form" class="search-form" autocomplete="off">
      <label for="query-input" class="visually-hidden">Vyhledávací dotaz</label>
      <input
        type="text"
        id="query-input"
        name="q"
        placeholder="Zadejte klíčové slovní spojení…"
        required
      />
      <button type="submit" id="search-btn">Hledat</button>
    </form>

    <div id="status" class="status" aria-live="polite" hidden></div>

    <section id="results-section" class="results-section" hidden>
      <div class="results-header">
        <h2 id="results-title">Výsledky</h2>
        <div class="export-buttons">
          <button type="button" id="download-json-btn" disabled>Stáhnout JSON</button>
          <button type="button" id="download-csv-btn" disabled>Stáhnout CSV</button>
        </div>
      </div>
      <ol id="results-list" class="results-list"></ol>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
